# Example: coordinators = {
#   "jdk-17": {
#     "classpath": "airflow.sdk.coordinators.java.JavaCoordinator",
#     "kwargs": {
#       "jars_root": ["/opt/airflow/java-bundles"],
#       "java_executable": "/usr/lib/jvm/java-17-openjdk/bin/java",
#       "jvm_args": ["-Xmx1024m"]
