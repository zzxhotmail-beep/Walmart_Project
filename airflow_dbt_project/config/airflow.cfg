[scheduler]
# Task instances listen for external kill signal (when you clear tasks
# from the CLI or the UI), this defines the frequency at which they should
# listen (in seconds).
#
# Variable: AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC
#
job_heartbeat_sec = 5

# The scheduler constantly tries to trigger new tasks (look at the
# scheduler section in the docs for more information). This defines
# how often the scheduler should run (in seconds).
#
# Variable: AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC
#
scheduler_heartbeat_sec = 5

# The frequency (in seconds) at which the LocalTaskJob should send heartbeat signals to the
# scheduler to notify it's still alive. If this value is set to 0, the heartbeat interval will default
# to the value of ``[scheduler] task_instance_heartbeat_timeout``.
#
# Variable: AIRFLOW__SCHEDULER__TASK_INSTANCE_HEARTBEAT_SEC
#
task_instance_heartbeat_sec = 0

# The number of times to try to schedule each DAG file
# -1 indicates unlimited number
#
# Variable: AIRFLOW__SCHEDULER__NUM_RUNS
#
num_runs = -1

# Only count scheduler runs where the scheduler was idle (no tasks queued or finished)
# toward the run limit set by ``[scheduler] num_runs``. The count resets whenever a task is processed.
#
# Variable: AIRFLOW__SCHEDULER__ONLY_IDLE
#
only_idle = false

# Controls how long the scheduler will sleep between loops, but if there was nothing to do
# in the loop. i.e. if it scheduled something then it will start the next loop
# iteration straight away.
#
# Variable: AIRFLOW__SCHEDULER__SCHEDULER_IDLE_SLEEP_TIME
#
scheduler_idle_sleep_time = 1

# How often (in seconds) to check for stale DAGs (DAGs which are no longer present in
# the expected files) which should be deactivated, as well as assets that are no longer
# referenced and should be marked as orphaned.
#
# Variable: AIRFLOW__SCHEDULER__PARSING_CLEANUP_INTERVAL
#
parsing_cleanup_interval = 60

# How often (in seconds) should pool usage stats be sent to StatsD (if statsd_on is enabled)
#
# Variable: AIRFLOW__SCHEDULER__POOL_METRICS_INTERVAL
#
pool_metrics_interval = 5.0

# How often (in seconds) should task instance (scheduled, queued, running and deferred) stats
# be sent to StatsD (if statsd_on is enabled)
#
# Variable: AIRFLOW__SCHEDULER__TI_METRICS_INTERVAL
#
ti_metrics_interval = 30.0

# How often (in seconds) the scheduler emits metrics on running DAG runs
# to StatsD (if statsd_on is enabled)
#
# Variable: AIRFLOW__SCHEDULER__DAGRUN_METRICS_INTERVAL
#
dagrun_metrics_interval = 30.0

# If the last scheduler heartbeat happened more than ``[scheduler] scheduler_health_check_threshold``
# ago (in seconds), scheduler is considered unhealthy.
# This is used by the health check in the **/health** endpoint and in ``airflow jobs check`` CLI
# for SchedulerJob.
#
# Variable: AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD
#
scheduler_health_check_threshold = 30

# When you start a scheduler, airflow starts a tiny web server
# subprocess to serve a health check if this is set to ``True``
#
# Variable: AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK
#
enable_health_check = False

# When you start a scheduler, airflow starts a tiny web server
# subprocess to serve a health check on this host
#
# Variable: AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_SERVER_HOST
#
scheduler_health_check_server_host = 0.0.0.0

# When you start a scheduler, airflow starts a tiny web server
# subprocess to serve a health check on this port
#
# Variable: AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_SERVER_PORT
#
scheduler_health_check_server_port = 8974

# How often (in seconds) should the scheduler check for orphaned tasks and SchedulerJobs
#
# Variable: AIRFLOW__SCHEDULER__ORPHANED_TASKS_CHECK_INTERVAL
#
orphaned_tasks_check_interval = 300.0

# Local task jobs periodically heartbeat to the DB. If the job has
# not heartbeat in this many seconds, the scheduler will mark the
# associated task instance as failed and will re-schedule the task.
#
# Variable: AIRFLOW__SCHEDULER__TASK_INSTANCE_HEARTBEAT_TIMEOUT
#
task_instance_heartbeat_timeout = 300

# How often (in seconds) should the scheduler check for task instances whose heartbeats have timed out.
#
# Variable: AIRFLOW__SCHEDULER__TASK_INSTANCE_HEARTBEAT_TIMEOUT_DETECTION_INTERVAL
#
task_instance_heartbeat_timeout_detection_interval = 10.0

# Turn on scheduler catchup by setting this to ``True``.
# Default behavior is unchanged and
# Command Line Backfills still work, but the scheduler
# will not do scheduler catchup if this is ``False``,
# however it can be set on a per DAG basis in the
# DAG definition (catchup)
#
# Variable: AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT
#
catchup_by_default = False

# Setting this to ``True`` will make first task instance of a task
# ignore depends_on_past setting. A task instance will be considered
# as the first task instance of a task when there is no task instance
# in the DB with a logical_date earlier than it., i.e. no manual marking
# success will be needed for a newly added task to be scheduled.
#
# Variable: AIRFLOW__SCHEDULER__IGNORE_FIRST_DEPENDS_ON_PAST_BY_DEFAULT
#
ignore_first_depends_on_past_by_default = True

# This determines the number of task instances to be evaluated for scheduling
# during each scheduler loop.
# Set this to 0 to use the value of ``[core] parallelism``
#
# Variable: AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY
#
max_tis_per_query = 16

# Should the scheduler issue ``SELECT ... FOR UPDATE`` in relevant queries.
# If this is set to ``False`` then you should not run more than a single
# scheduler at once
#
# Variable: AIRFLOW__SCHEDULER__USE_ROW_LEVEL_LOCKING
#
use_row_level_locking = True

# Max number of DAGs to create DagRuns for per scheduler loop.
#
# Variable: AIRFLOW__SCHEDULER__MAX_DAGRUNS_TO_CREATE_PER_LOOP
#
max_dagruns_to_create_per_loop = 10

# How many DagRuns should a scheduler examine (and lock) when scheduling
# and queuing tasks.
#
# Variable: AIRFLOW__SCHEDULER__MAX_DAGRUNS_PER_LOOP_TO_SCHEDULE
#
max_dagruns_per_loop_to_schedule = 20

# Maximum number of downstream partition keys produced by a single
# PartitionMapper invocation, applied to any PartitionMapper that returns
# multiple keys (e.g. FanOutMapper). When a mapper instance sets a per-instance
# ``max_downstream_keys`` parameter, that value completely overrides this global
# cap for that instance — including when the per-mapper value exceeds this
# global. **Deployment managers cannot enforce this setting as a hard
# cluster-wide ceiling**; treat this value as a default that user code may
# override.
#
# Variable: AIRFLOW__SCHEDULER__PARTITION_MAPPER_MAX_DOWNSTREAM_KEYS
#
partition_mapper_max_downstream_keys = 1000

# Turn off scheduler use of cron intervals by setting this to ``False``.
# DAGs submitted manually in the web UI or with trigger_dag will still run.
#
# Variable: AIRFLOW__SCHEDULER__USE_JOB_SCHEDULE
#
use_job_schedule = True

# How often to check for expired trigger requests that have not run yet.
#
# Variable: AIRFLOW__SCHEDULER__TRIGGER_TIMEOUT_CHECK_INTERVAL
#
trigger_timeout_check_interval = 15

# Amount of time a task can be in the queued state before being retried or set to failed.
# 
# This value also sets the lifetime of the workload JWT token that is sent with the task
# to an executor queue, so a task waiting in the queue can still authenticate to the
# Execution API until its queue-starvation deadline.
#
# Variable: AIRFLOW__SCHEDULER__TASK_QUEUED_TIMEOUT
#
task_queued_timeout = 600.0

# How often to check for tasks that have been in the queued state for
# longer than ``[scheduler] task_queued_timeout``.
#
# Variable: AIRFLOW__SCHEDULER__TASK_QUEUED_TIMEOUT_CHECK_INTERVAL
#
task_queued_timeout_check_interval = 120.0

# The run_id pattern used to verify the validity of user input to the run_id parameter when
# triggering a DAG. This pattern cannot change the pattern used by scheduler to generate run_id
# for scheduled DAG runs or DAG runs triggered without changing the run_id parameter.
#
# Variable: AIRFLOW__SCHEDULER__ALLOWED_RUN_ID_PATTERN
#
allowed_run_id_pattern = ^[A-Za-z0-9_.~:+-]+$

# Whether to create DAG runs that span an interval or one single point in time for cron schedules, when
# a cron string is provided to ``schedule`` argument of a DAG.
# 
# * ``True``: **CronDataIntervalTimetable** is used, which is suitable
#   for DAGs with well-defined data interval. You get contiguous intervals from the end of the previous
#   interval up to the scheduled datetime.
# * ``False``: **CronTriggerTimetable** is used, which is closer to the behavior of cron itself.
# 
# Notably, for **CronTriggerTimetable**, the logical date is the same as the time the DAG Run will
# try to schedule, while for **CronDataIntervalTimetable**, the logical date is the beginning of
# the data interval, but the DAG Run will try to schedule at the end of the data interval.
# 
# When a DAG is switched from **CronTriggerTimetable** to **CronDataIntervalTimetable** (for example,
# by flipping this setting from ``False`` to ``True``), the next scheduled run skips one period past
# the most recent **CronTriggerTimetable** run to avoid colliding with its logical date.
#
# Variable: AIRFLOW__SCHEDULER__CREATE_CRON_DATA_INTERVALS
#
create_cron_data_intervals = False

# Whether to create DAG runs that span an interval or one single point in time when a timedelta or
# relativedelta is provided to ``schedule`` argument of a DAG.
# 
# * ``True``: **DeltaDataIntervalTimetable** is used, which is suitable for DAGs with well-defined data
#   interval. You get contiguous intervals from the end of the previous interval up to the scheduled
#   datetime.
# * ``False``: **DeltaTriggerTimetable** is used, which is suitable for DAGs that simply want to say
#   e.g. "run this every day" and do not care about the data interval.
# 
# Notably, for **DeltaTriggerTimetable**, the logical date is the same as the time the DAG Run will
# try to schedule, while for **DeltaDataIntervalTimetable**, the logical date is the beginning of
# the data interval, but the DAG Run will try to schedule at the end of the data interval.
#
# Variable: AIRFLOW__SCHEDULER__CREATE_DELTA_DATA_INTERVALS
#
create_delta_data_intervals = False

# Whether to enable memory allocation tracing in the scheduler. If enabled, Airflow will start
# tracing memory allocation and log the top 10 memory usages at the error level upon receiving the
# signal SIGUSR1.
# This is an expensive operation and generally should not be used except for debugging purposes.
#
# Variable: AIRFLOW__SCHEDULER__ENABLE_TRACEMALLOC
#
enable_tracemalloc = False

[connection_test]
# Configuration for the deferred connection-test workflow that dispatches
# test requests to workers via the executor (instead of running them
# in-process on the API server).

# Maximum number of seconds a worker-dispatched connection test is
# allowed to run before it is considered timed out. The scheduler
# reaper uses this value plus a grace period to mark stale tests as
# failed.
#
# Variable: AIRFLOW__CONNECTION_TEST__TIMEOUT
#
timeout = 60

# Maximum number of connection tests that can be active
# (QUEUED + RUNNING) at the same time. Excess tests will remain in
# PENDING state until slots become available. This cap is enforced
# per-scheduler, not globally: with N HA schedulers the worst-case
# per-tick dispatch is ``N * max_concurrency``. Connection tests are
# user-initiated and rare, so the overshoot self-corrects via the
# reaper.
#
# Variable: AIRFLOW__CONNECTION_TEST__MAX_CONCURRENCY
#
max_concurrency = 4

# How often (in seconds) the scheduler should check for stale
# connection tests (QUEUED or RUNNING past their timeout + grace
# period) and mark them as failed.
#
# Variable: AIRFLOW__CONNECTION_TEST__REAPER_INTERVAL
#
reaper_interval = 30.0

[triggerer]
# How many triggers a single Triggerer will run at once, by default.
#
# Variable: AIRFLOW__TRIGGERER__CAPACITY
#
capacity = 1000

# How often to heartbeat the Triggerer job to ensure it hasn't been killed.
#
# Variable: AIRFLOW__TRIGGERER__JOB_HEARTBEAT_SEC
#
job_heartbeat_sec = 5

# If the last triggerer heartbeat happened more than ``[triggerer] triggerer_health_check_threshold``
# ago (in seconds), triggerer is considered unhealthy.
# This is used by the health check in the **/health** endpoint and in ``airflow jobs check`` CLI
# for TriggererJob.
#
# Variable: AIRFLOW__TRIGGERER__TRIGGERER_HEALTH_CHECK_THRESHOLD
#
triggerer_health_check_threshold = 30

# If the TriggerRunner subprocess's async event loop sends no communication to the parent
# process for more than this many seconds, the parent stops updating the triggerer's
# heartbeat in the database. The triggerer then appears unhealthy to the scheduler, which
# will reassign its triggers. This detects a deadlocked or hung event loop that the normal
# process-alive check cannot catch. Set to 0 to disable the watchdog.
#
# Variable: AIRFLOW__TRIGGERER__RUNNER_HEALTH_CHECK_THRESHOLD
#
runner_health_check_threshold = 30

# Threshold in seconds for logging a warning when the Triggerer's async thread appears blocked.
# Increase this value if your deployment can tolerate longer delays in the Triggerer's async
# loop before logging a warning.
#
# Variable: AIRFLOW__TRIGGERER__BLOCKED_MAIN_THREAD_WARNING_THRESHOLD
#
blocked_main_thread_warning_threshold = 0.2

# Maximum number of triggers to select per loop. Set this notably lower than ``[triggerer] capacity``
# to keep load balanced across triggerers in HA deployments.
# Benchmarks show that two triggerers can still claim about 1,000 triggers within one second by default.
#
# Variable: AIRFLOW__TRIGGERER__MAX_TRIGGER_TO_SELECT_PER_LOOP
#
max_trigger_to_select_per_loop = 50

# Maximum number of seconds the triggerer will wait for ``BaseTrigger.on_kill()`` to complete
# before giving up and logging a warning. Prevents a slow or hung external API call from
# blocking the triggerer indefinitely when a deferred task is killed by a user.
#
# Variable: AIRFLOW__TRIGGERER__ON_KILL_TIMEOUT
#
on_kill_timeout = 30

# When set to True, deferred tasks will register triggers with the task queue they originated from,
# and triggerers can selectively run triggers based on their queue assignment. Only relevant when using
# executors which support task queue assignment. For more details, refer to the trigger docs.
#
# Variable: AIRFLOW__TRIGGERER__QUEUES_ENABLED
#
queues_enabled = False

# Per-subscriber buffer size for shared-stream triggers (triggers that opt into a shared poll loop
# via ``BaseEventTrigger.shared_stream_key``). Each subscribing trigger keeps an in-memory queue of
# raw events produced by the shared poll; if a slow subscriber fills its queue, only that subscriber
# fails, sibling subscribers are unaffected. Increase if a slow subscriber must tolerate bursts from
# a fast upstream.
#
# Variable: AIRFLOW__TRIGGERER__SHARED_STREAM_SUBSCRIBER_QUEUE_SIZE
#
shared_stream_subscriber_queue_size = 1024

# Per-event ack timeout in seconds for shared-stream triggers running in ack mode (triggers that
# override ``BaseEventTrigger.create_shared_stream_producer``). A subscriber that has not finished
# processing an event (moved past it and had its derived trigger events confirmed persisted) within
# this window is force-failed. Other subscribers in the same group are unaffected; once they
# resolve, the producer advances normally.
#
# Variable: AIRFLOW__TRIGGERER__SHARED_STREAM_ACK_TIMEOUT
#
shared_stream_ack_timeout = 300.0

# Seconds to delay the start of polling after a shared-stream group is created, giving triggers
# that share the same key a window to subscribe before any event is broadcast. The default of 0
# starts polling immediately (no delay). Set to a small positive value (e.g. 2.0–5.0) to reduce
# the chance of triggers missing events on triggerer restart, when multiple triggers sharing a key
# re-subscribe concurrently and the first to arrive would otherwise start the poll before the
# others have joined. This is a best-effort window: triggers that take longer than the grace period
# to re-subscribe can still miss events committed after polling starts.
#
# Variable: AIRFLOW__TRIGGERER__SHARED_STREAM_COHORT_GRACE_PERIOD
#
shared_stream_cohort_grace_period = 0.0

[kerberos]
# Location of your ccache file once kinit has been performed.
#
# Variable: AIRFLOW__KERBEROS__CCACHE
#
ccache = /tmp/airflow_krb5_ccache

# gets augmented with fqdn
#
# Variable: AIRFLOW__KERBEROS__PRINCIPAL
#
principal = airflow

# Determines the frequency at which initialization or re-initialization processes occur.
#
# Variable: AIRFLOW__KERBEROS__REINIT_FREQUENCY
#
reinit_frequency = 3600

# Path to the kinit executable
#
# Variable: AIRFLOW__KERBEROS__KINIT_PATH
#
kinit_path = kinit

# Designates the path to the Kerberos keytab file for the Airflow user
#
# Variable: AIRFLOW__KERBEROS__KEYTAB
#
keytab = airflow.keytab

# Allow to disable ticket forwardability.
#
# Variable: AIRFLOW__KERBEROS__FORWARDABLE
#
forwardable = True

# Allow to remove source IP from token, useful when using token behind NATted Docker host.
#
# Variable: AIRFLOW__KERBEROS__INCLUDE_IP
#
include_ip = True

[sensors]
# Sensor default timeout, 7 days by default (7 * 24 * 60 * 60).
#
# Variable: AIRFLOW__SENSORS__DEFAULT_TIMEOUT
#
default_timeout = 604800

[dag_processor]
# Configuration for the Airflow DAG processor. This includes, for example:
#   - DAG bundles, which allows Airflow to load DAGs from different sources
#   - Parsing configuration, like:
#      - how often to refresh DAGs from those sources
#      - how many files to parse concurrently

# String path to folder where Airflow bundles can store files locally. Not templated.
# If no path is provided, Airflow will use ``Path(tempfile.gettempdir()) / "airflow"``.
# This path must be absolute.
#
# Example: dag_bundle_storage_path = /tmp/some-place
#
# Variable: AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_STORAGE_PATH
#
# dag_bundle_storage_path = 

# List of backend configs.  Must supply name, classpath, and kwargs for each backend.
# 
# By default, ``refresh_interval`` is set to ``[dag_processor] refresh_interval``, but that can
# also be overridden in kwargs if desired.
# 
# The default is the dags folder dag bundle.
# 
# Note: As shown below, you can split your json config over multiple lines by indenting.
# See configparser documentation for an example:
# https://docs.python.org/3/library/configparser.html#supported-ini-file-structure.
#
# Example: dag_bundle_config_list = [
#       {
#         "name": "my-git-repo",
#         "classpath": "airflow.providers.git.bundles.git.GitDagBundle",
#         "kwargs": {
#           "subdir": "dags",
#           "tracking_ref": "main",
#           "refresh_interval": 0
#         }
#       }
#     ]
#
# Variable: AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST
#
dag_bundle_config_list = [
        {
            "name": "dags-folder",
            "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle",
            "kwargs": {}
        }
    ]

# How often (in seconds) to refresh, or look for new files, in a DAG bundle.
#
# Variable: AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL
#
refresh_interval = 300

# The DAG processor can run multiple processes in parallel to parse dags.
# This defines how many processes will run.
#
# Variable: AIRFLOW__DAG_PROCESSOR__PARSING_PROCESSES
#
parsing_processes = 2

# One of ``modified_time``, ``random_seeded_by_host`` and ``alphabetical``.
# The DAG processor will list and sort the dag files to decide the parsing order.
# 
# * ``modified_time``: Sort by modified time of the files. This is useful on large scale to parse the
#   recently modified DAGs first.
# * ``random_seeded_by_host``: Sort randomly across multiple DAG processors but with same order on the
#   same host, allowing each processor to parse the files in a different order.
# * ``alphabetical``: Sort by filename
#
# Variable: AIRFLOW__DAG_PROCESSOR__FILE_PARSING_SORT_MODE
#
file_parsing_sort_mode = modified_time

# The maximum number of callbacks that are fetched during a single loop.
#
# Variable: AIRFLOW__DAG_PROCESSOR__MAX_CALLBACKS_PER_LOOP
#
max_callbacks_per_loop = 20

# Number of seconds after which a DAG file is parsed. The DAG file is parsed every
# ``[dag_processor] min_file_process_interval`` number of seconds. Updates to DAGs are reflected after
# this interval. Keeping this number low will increase CPU usage.
#
# Variable: AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL
#
min_file_process_interval = 30

# How long (in seconds) to wait after we have re-parsed a DAG file before deactivating stale
# DAGs (DAGs which are no longer present in the expected files). The reason why we need
# this threshold is to account for the time between when the file is parsed and when the
# DAG is loaded. The absolute maximum that this could take is
# ``[dag_processor] dag_file_processor_timeout``, but when you have a long timeout configured,
# it results in a significant delay in the deactivation of stale dags.
#
# Variable: AIRFLOW__DAG_PROCESSOR__STALE_DAG_THRESHOLD
#
stale_dag_threshold = 50

# How long before timing out a DagFileProcessor, which processes a dag file
#
# Variable: AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT
#
dag_file_processor_timeout = 50

# How often should DAG processor stats be printed to the logs. Setting to 0 will disable printing stats
#
# Variable: AIRFLOW__DAG_PROCESSOR__PRINT_STATS_INTERVAL
#
print_stats_interval = 30

# If the last dag processor heartbeat happened more than
# ``[dag_processor] health_check_threshold`` ago (in seconds),
# dag processor is considered unhealthy.
# This is used by the health check in the **/health** endpoint and in ``airflow jobs check``
# CLI for DagProcessorJob.
#
# Variable: AIRFLOW__DAG_PROCESSOR__HEALTH_CHECK_THRESHOLD
#
health_check_threshold = 30

# Always run tasks with the latest code.  If set to True, the bundle version will not
# be stored on the dag run and therefore, the latest code will always be used.
# 
# .. note::
# 
#   This setting only applies to bundles that support versioning and does not affect
#   DAG versions displayed in the UI.
#
# Variable: AIRFLOW__DAG_PROCESSOR__DISABLE_BUNDLE_VERSIONING
#
disable_bundle_versioning = False

# How often the DAG processor should check if any DAG bundles are ready for a refresh, either by hitting
# the bundles refresh_interval or because another DAG processor has seen a newer version of the bundle.
# A low value means we check more frequently, and have a smaller window of time where DAG processors are
# out of sync with each other, parsing different versions of the same bundle.
#
# Variable: AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL
#
bundle_refresh_check_interval = 5

# On shared workers, bundle copies accumulate in local storage as tasks run
# and version of the bundle changes.
# This setting represents the delta in seconds between checks for these stale bundles.
# Bundles which are older than `stale_bundle_cleanup_age_threshold` may be removed. But
# we always keep `stale_bundle_cleanup_min_versions` versions locally.
# Set to 0 or negative to disable.
#
# Variable: AIRFLOW__DAG_PROCESSOR__STALE_BUNDLE_CLEANUP_INTERVAL
#
stale_bundle_cleanup_interval = 1800

# Bundle versions used more recently than this threshold will not be removed.
# Recency of use is determined by when the task began running on the worker,
# that age is compared with this setting, given as time delta in seconds.
#
# Variable: AIRFLOW__DAG_PROCESSOR__STALE_BUNDLE_CLEANUP_AGE_THRESHOLD
#
stale_bundle_cleanup_age_threshold = 21600

# Minimum number of local bundle versions to retain on disk.
# Local bundle versions older than `stale_bundle_cleanup_age_threshold` will
# only be deleted we have more than `stale_bundle_cleanup_min_versions` versions
# accumulated on the worker.
#
# Variable: AIRFLOW__DAG_PROCESSOR__STALE_BUNDLE_CLEANUP_MIN_VERSIONS
#
stale_bundle_cleanup_min_versions = 10

# The dag_processor reads dag files to extract the airflow modules that are going to be used,
# and imports them ahead of time to avoid having to re-do it for each parsing process.
# This flag can be set to ``False`` to disable this behavior in case an airflow module needs
# to be freshly imported each time (at the cost of increased DAG parsing time).
#
# Variable: AIRFLOW__DAG_PROCESSOR__PARSING_PRE_IMPORT_MODULES
#
parsing_pre_import_modules = True

# Controls the behavior of Dag stability checker performed before Dag parsing in the Dag processor.
# The check detects detect potential issues such as runtime-varying values in Dag/Task constructors
# that could cause Dag version inflation.
# 
# * ``off``: Disables Dag stability checks entirely. No errors or warnings are generated.
# * ``warning``: Dags load normally but warnings are displayed in the UI when issues are detected.
# * ``error``: Treats Dag stability failures as Dag import errors, preventing the Dag from loading.
# 
# Default is "warning" to alert users of potential issues without blocking Dag execution.
#
# Variable: AIRFLOW__DAG_PROCESSOR__DAG_VERSION_INFLATION_CHECK_LEVEL
#
dag_version_inflation_check_level = warning

[state_store]
# Configuration for task and asset state storage backend.

# Full dotted path to the class that implements state storage for tasks and assets.
# The class must be a subclass of ``BaseStoreBackend``.
# The default implementation persists state in the Airflow metadata database.
#
# Example: backend = mypackage.state.CustomStoreBackend
#
# Variable: AIRFLOW__STATE_STORE__BACKEND
#
backend = airflow.state.metastore.MetastoreBackend

# If set to True, all task state keys for a task instance are automatically cleared
# when that task instance moved to SUCCESS.
# 
# Defaults to False so that task state persists after success for observability —
# operators and the UI can inspect what the task wrote (e.g. submitted job IDs,
# advanced watermarks) after the run completes.
# Consider setting to True if you do not need post-success visibility and want automatic
# cleanup without waiting for the global retention period.
#
# Example: clear_on_success = True
#
# Variable: AIRFLOW__STATE_STORE__CLEAR_ON_SUCCESS
#
clear_on_success = False

# Number of days to retain task state after their last update.
# Rows older than this are removed when cleanup is triggered.
# This config does not affect asset_state_store rows.
# Set to 0 to disable time-based cleanup entirely.
#
# Example: default_retention_days = 7
#
# Variable: AIRFLOW__STATE_STORE__DEFAULT_RETENTION_DAYS
#
default_retention_days = 30

# Number of rows deleted per batch during cleanup. Defaults to 0 (no batching).
# Tune this on deployments with large task_state_store tables to improve performance per transaction.
#
# Example: state_cleanup_batch_size = 10000
#
# Variable: AIRFLOW__STATE_STORE__STATE_CLEANUP_BATCH_SIZE
#
state_cleanup_batch_size = 0

# Maximum size in bytes that a single task or asset store value may have when written via
# the public REST API. Values that exceed this limit are rejected with a 422 error.
# 
# Workers writing via the execution API are not blocked, they log a warning and the write
# proceeds, so tasks are never interrupted mid-execution. Set to 0 to disable the limit entirely.
# 
# The default of 65535 bytes (64 KB) is a policy default suited for coordination state such as
# job IDs, cursors, and small status maps — the underlying database column (MEDIUMTEXT on MySQL,
# unbounded Text on Postgres) does not enforce this limit. For larger payloads, configure a custom
# [workers] state_store_backend to offload values to external storage.
#
# Example: max_value_storage_bytes = 1048576
#
# Variable: AIRFLOW__STATE_STORE__MAX_VALUE_STORAGE_BYTES
#
max_value_storage_bytes = 65535

[profiling]
# Configuration for memory profiling in Airflow component.
# Currently, we provide profiling using Memray and additional tools may be added in the future
# Also, see the guide in Link (TBD)

# Comma-separated list of Airflow components to profile with memray.
# Valid components are: scheduler, api, dag_processor, triggerer
# 
# This option only takes effect when it is not set to blank (default option).
# start tracing memory allocation and store the metrics in "$AIRFLOW_HOME/<component>_memory.bin"
# To generate analyzed view, run this command in base directory where the bin file is generated
# ```
# # see also https://bloomberg.github.io/memray/run.html#aggregated-capture-files
# memray flamegraph $AIRFLOW_HOME/<component>_memory.bin
# ```
# This is an expensive operation and generally should not be used except for debugging purposes.
#
# Example: memray_trace_components = scheduler,api,dag_processor
#
# Variable: AIRFLOW__PROFILING__MEMRAY_TRACE_COMPONENTS
#
# memray_trace_components = 

# Whether to enable memray's ``native_traces`` and ``trace_python_allocators`` options
# when ``memray_trace_components`` is set. Captures C/C++ stack frames for compiled
# extensions (numpy, pandas, etc.) and small ``pymalloc`` allocations that would
# otherwise be invisible.
# 
# This adds significant runtime overhead and produces much larger profile files, so
# leave it disabled unless the default trace lacks the detail you need. Native symbol
# resolution is most accurate on Linux and less precise on macOS. See
# https://bloomberg.github.io/memray/api.html for the underlying ``Tracker`` options.
#
# Variable: AIRFLOW__PROFILING__MEMRAY_DETAILED_TRACING
#
memray_detailed_tracing = False

[callbacks]
# Configuration for callbacks (deadline alerts, etc.).

# Maximum execution time in seconds for deadline callbacks.
# Set to a positive integer to enable. When a callback exceeds this duration,
# it is terminated with SIGTERM followed by SIGKILL if it does not exit within 5 seconds.
# 0 means no timeout (default).
#
# Example: callback_execution_timeout = 300
#
# Variable: AIRFLOW__CALLBACKS__CALLBACK_EXECUTION_TIMEOUT
#
callback_execution_timeout = 0

[aws]
# This section contains settings for Amazon Web Services (AWS) integration.

# Full import path to the class which implements a custom session factory for
# ``boto3.session.Session``. For more details please have a look at
# :ref:`howto/connection:aws:session-factory`.
